<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Paseo Delayed Capture Harness Target</title>
    <style>
      html,
      body {
        width: 1280px;
        min-height: 1600px;
        margin: 0;
        background: #202020;
        overflow: auto;
        font-family: Arial, Helvetica, sans-serif;
      }

      .content {
        opacity: 0;
      }

      body.ready {
        background: #ff00ff;
      }

      body.ready .content {
        opacity: 1;
      }

      .label {
        position: absolute;
        left: 48px;
        top: 48px;
        color: #ffffff;
        font-size: 72px;
        font-weight: 800;
        line-height: 1;
        text-shadow:
          5px 5px 0 #000000,
          -2px -2px 0 #000000;
      }

      .sub {
        position: absolute;
        left: 54px;
        top: 150px;
        color: #000000;
        background: #ffffff;
        font-size: 34px;
        font-weight: 700;
        padding: 10px 18px;
      }

      .block {
        position: absolute;
        left: 56px;
        top: 220px;
        width: 360px;
        height: 92px;
        background: linear-gradient(
          90deg,
          #000000 0 25%,
          #ffffff 25% 50%,
          #000000 50% 75%,
          #ffffff 75% 100%
        );
        border: 8px solid #000000;
      }

      .bottom {
        position: absolute;
        left: 48px;
        top: 1370px;
        color: #ffffff;
        font-size: 60px;
        font-weight: 800;
        text-shadow: 5px 5px 0 #000000;
      }
    </style>
    <script>
      setTimeout(() => {
        document.body.classList.add("ready");
      }, 1500);
    </script>
  </head>
  <body>
    <div class="content">
      <div class="label">PASEO CAPTURE HARNESS</div>
      <div class="sub">DELAYED FIRST PAINT TARGET</div>

    </div>
  </body>
</html>
