name: Maintain plus branch

on:
  workflow_dispatch:

  # Your fork won't receive upstream push events, so poll periodically.
  schedule:
    - cron: "17 */6 * * *"

  # Rebuild when you update any branch in your fork, except the generated branch.
  push:
    branches-ignore:
      - plus

permissions:
  contents: write
  pull-requests: read

defaults:
  run:
    shell: bash

concurrency:
  group: maintain-plus
  cancel-in-progress: true

env:
  UPSTREAM: getpaseo/paseo
  PLUS_BRANCH: plus
  INCLUDE_DRAFTS: "false"
  DESKTOP_PACKAGE_PATH: packages/desktop

jobs:
  rebuild-plus:
    runs-on: ubuntu-latest
    outputs:
      plus_sha: ${{ steps.rebuild.outputs.plus_sha }}
      plus_changed: ${{ steps.rebuild.outputs.plus_changed }}

    steps:
      - name: Rebuild plus from upstream + my open PRs
        id: rebuild
        env:
          GH_TOKEN: ${{ github.token }}
          FORK: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH="$(
            gh repo view "$UPSTREAM" \
              --json defaultBranchRef \
              --jq '.defaultBranchRef.name'
          )"

          echo "Upstream: $UPSTREAM"
          echo "Fork: $FORK"
          echo "Owner: $OWNER"
          echo "Base branch: $DEFAULT_BRANCH"
          echo "Generated branch: $PLUS_BRANCH"

          mkdir repo
          cd repo

          git init

          git remote add upstream "https://github.com/${UPSTREAM}.git"
          git remote add fork "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git"

          git fetch --no-tags --prune upstream \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/upstream/${DEFAULT_BRANCH}"

          git fetch --no-tags --prune fork \
            "+refs/heads/*:refs/remotes/fork/*"

          old_plus_sha="$(git rev-parse --verify --quiet "refs/remotes/fork/${PLUS_BRANCH}" || true)"
          if [[ -n "$old_plus_sha" ]]; then
            echo "Previous $PLUS_BRANCH SHA: $old_plus_sha"
          else
            echo "Previous $PLUS_BRANCH SHA: <none>"
          fi

          git switch -c "$PLUS_BRANCH" "refs/remotes/upstream/${DEFAULT_BRANCH}"

          gh pr list \
            --repo "$UPSTREAM" \
            --author "$OWNER" \
            --state open \
            --limit 100 \
            --json number,title,headRefName,headRepositoryOwner,isDraft \
            > /tmp/prs.json

          jq -r \
            --arg owner "$OWNER" \
            --arg include "$INCLUDE_DRAFTS" \
            '
              .[]
              | select(.headRepositoryOwner.login == $owner)
              | select($include == "true" or (.isDraft | not))
              | [.number, .headRefName, .title]
              | @tsv
            ' /tmp/prs.json > /tmp/prs.tsv

          if [[ ! -s /tmp/prs.tsv ]]; then
            echo "No open matching PRs. $PLUS_BRANCH will equal upstream/${DEFAULT_BRANCH}."
          fi

          while IFS=$'\t' read -r number branch title; do
            echo "::group::Merging PR #${number}: ${branch} — ${title}"

            if ! git rev-parse --verify --quiet "refs/remotes/fork/${branch}" >/dev/null; then
              echo "::error::Could not find fork branch ${branch}"
              exit 1
            fi

            git merge --no-edit --no-ff "refs/remotes/fork/${branch}"

            echo "::endgroup::"
          done < /tmp/prs.tsv

          plus_sha="$(git rev-parse HEAD)"
          plus_changed="true"
          if [[ -n "$old_plus_sha" && "$old_plus_sha" == "$plus_sha" ]]; then
            plus_changed="false"
          fi

          echo "Generated $PLUS_BRANCH SHA: $plus_sha"
          echo "plus_sha=$plus_sha" >> "$GITHUB_OUTPUT"
          echo "plus_changed=$plus_changed" >> "$GITHUB_OUTPUT"

          {
            echo "## Maintained plus branch"
            echo
            echo "Base: ${UPSTREAM}@${DEFAULT_BRANCH}"
            echo
            if [[ -s /tmp/prs.tsv ]]; then
              echo "Merged PR branches:"
              awk -F '\t' '{ printf "- #%s `%s` — %s\n", $1, $2, $3 }' /tmp/prs.tsv
            else
              echo "No open matching PR branches were merged."
            fi
            echo
            echo "Generated plus SHA: \`${plus_sha}\`"
            echo "Changed from previous plus: \`${plus_changed}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          git push --force-with-lease fork "HEAD:refs/heads/${PLUS_BRANCH}"

  build-desktop-artifacts:
    name: Build desktop artifact (${{ matrix.platform }} ${{ matrix.electron_arch }})
    needs: rebuild-plus
    if: ${{ needs.rebuild-plus.outputs.plus_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-14
            electron_arch: arm64
            artifact_globs: |
              packages/desktop/release/*.dmg
              packages/desktop/release/*.zip
          - platform: macos
            runner: macos-15-intel
            electron_arch: x64
            artifact_globs: |
              packages/desktop/release/*.dmg
              packages/desktop/release/*.zip
          - platform: linux
            runner: ubuntu-22.04
            electron_arch: x64
            artifact_globs: |
              packages/desktop/release/*.AppImage
              packages/desktop/release/*.deb
              packages/desktop/release/*.rpm
              packages/desktop/release/*.tar.gz
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout generated plus branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PLUS_BRANCH }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      - name: Install JS dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Set plus package versions
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          const rootPackagePath = 'package.json';
          const rootPackage = JSON.parse(fs.readFileSync(rootPackagePath, 'utf8'));
          const match = String(rootPackage.version).match(/^(\d+)\.(\d+)\.(\d+)/);
          if (!match) {
            throw new Error(`Could not derive semver base from root version ${rootPackage.version}`);
          }

          const version = `${match[1]}.${match[2]}.${match[3]}-plus.${process.env.RUN_NUMBER}`;
          rootPackage.version = version;
          fs.writeFileSync(rootPackagePath, `${JSON.stringify(rootPackage, null, 2)}\n`);
          console.log(`Set root version to ${version}`);
          NODE
          npm run version:sync-internal

      - name: Install Linux packaging prerequisites
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb rpm

      - name: Build desktop artifact
        env:
          GH_TOKEN: ${{ github.token }}
          EP_GH_IGNORE_TIME: true
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PASEO_DESKTOP_SMOKE: "1"
        run: |
          set -euo pipefail

          build_args=(-- --publish never --${{ matrix.platform == 'macos' && 'mac' || 'linux' }} --${{ matrix.electron_arch }})

          if [[ "${{ matrix.platform }}" == "macos" && -z "${CSC_LINK:-}" ]]; then
            echo "No Apple signing certificate secret configured; building unsigned macOS artifact."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            build_args+=("-c.mac.identity=null")
            build_args+=("-c.mac.notarize=false")
            build_args+=("-c.mac.hardenedRuntime=false")
          fi

          npm run build:desktop "${build_args[@]}"

      - name: List built desktop artifacts
        run: find "${DESKTOP_PACKAGE_PATH}/release" -maxdepth 1 -type f -print | sort

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paseo-plus-desktop-${{ matrix.platform }}-${{ matrix.electron_arch }}-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}
          path: ${{ matrix.artifact_globs }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Add desktop artifact summary
        run: |
          {
            echo "## Desktop plus artifact: ${{ matrix.platform }} ${{ matrix.electron_arch }}"
            echo
            echo "Built from \`${PLUS_BRANCH}\` at \`${{ needs.rebuild-plus.outputs.plus_sha }}\`."
            echo
            echo "Download the artifact named:"
            echo
            echo "\`paseo-plus-desktop-${{ matrix.platform }}-${{ matrix.electron_arch }}-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}\`"
            echo
            if [[ "${{ matrix.platform }}" == "macos" ]]; then
              echo "If Apple signing secrets are not configured in this fork, this macOS artifact is unsigned."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-cli-server-artifacts:
    name: Build installable CLI/server npm packages
    needs: rebuild-plus
    if: ${{ needs.rebuild-plus.outputs.plus_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout generated plus branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PLUS_BRANCH }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      - name: Install JS dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Set plus package versions
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          const rootPackagePath = 'package.json';
          const rootPackage = JSON.parse(fs.readFileSync(rootPackagePath, 'utf8'));
          const match = String(rootPackage.version).match(/^(\d+)\.(\d+)\.(\d+)/);
          if (!match) {
            throw new Error(`Could not derive semver base from root version ${rootPackage.version}`);
          }

          const version = `${match[1]}.${match[2]}.${match[3]}-plus.${process.env.RUN_NUMBER}`;
          rootPackage.version = version;
          fs.writeFileSync(rootPackagePath, `${JSON.stringify(rootPackage, null, 2)}\n`);
          console.log(`Set root version to ${version}`);
          NODE
          npm run version:sync-internal

      - name: Build CLI/server package outputs
        run: npm run build:server:clean

      - name: Pack CLI/server install tarballs
        run: |
          set -euo pipefail
          mkdir -p artifacts/npm-packages
          workspaces=(
            @getpaseo/highlight
            @getpaseo/relay
            @getpaseo/protocol
            @getpaseo/client
            @getpaseo/server
            @getpaseo/cli
          )
          for workspace in "${workspaces[@]}"; do
            npm pack --workspace="$workspace" --pack-destination artifacts/npm-packages --ignore-scripts
          done

          cat > artifacts/npm-packages/install-cli-server.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$(dirname "$0")"
          npm install -g ./*.tgz
          SH
          chmod +x artifacts/npm-packages/install-cli-server.sh

          cat > artifacts/npm-packages/INSTALL.md <<'MD'
          # Paseo plus CLI/server packages

          These tarballs were built from the generated `plus` branch.

          To install the CLI and its local plus-version server dependencies:

          ```bash
          ./install-cli-server.sh
          ```

          Or manually:

          ```bash
          npm install -g ./*.tgz
          ```

          The installed CLI binary is:

          ```bash
          paseo
          ```
          MD

      - name: List packed CLI/server artifacts
        run: find artifacts/npm-packages -maxdepth 1 -type f -print | sort

      - name: Upload CLI/server npm package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paseo-plus-cli-server-npm-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}
          path: artifacts/npm-packages/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Add CLI/server artifact summary
        run: |
          {
            echo "## CLI/server plus artifact"
            echo
            echo "Built from \`${PLUS_BRANCH}\` at \`${{ needs.rebuild-plus.outputs.plus_sha }}\`."
            echo
            echo "Download the artifact named:"
            echo
            echo "\`paseo-plus-cli-server-npm-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}\`"
            echo
            echo "Install from the extracted artifact directory with:"
            echo
            echo "\`./install-cli-server.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"
