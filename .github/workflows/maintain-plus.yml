name: Maintain plus branch

# WHY THIS WORKFLOW EXISTS
# ------------------------
# This fork carries local/open PR work for weeks before upstream getpaseo/paseo
# merges it.  Rather than manually maintaining a long-lived integration branch,
# this workflow treats `plus` as generated output:
#
#   plus = latest upstream default branch + this fork owner's open non-draft PRs
#
# It then builds "out of band" install artifacts from that generated branch so the
# fork owner can run their pending changes before upstream merges them.
#
# WHAT IT DOES
# ------------
# 1. Polls upstream, and also reacts to pushes in this fork.
# 2. Rebuilds and force-pushes the generated `plus` branch.
# 3. Builds desktop installers for macOS arm64, macOS x64, and Linux x64.
# 4. Builds installable npm tarballs for the CLI/server workspace packages.
# 5. Uploads artifacts and writes the exact download/install commands to the
#    workflow summary.
#
# APPLE SIGNING / NOTARIZATION SECRETS
# ------------------------------------
# macOS artifacts are signed/notarized when these repository secrets exist.
#
# Developer ID signing certificate:
#   1. Create or locate a "Developer ID Application" certificate in your Apple
#      Developer account under Certificates, Identifiers & Profiles.  This is the
#      certificate type Apple uses for macOS apps distributed outside the Mac App
#      Store.
#   2. On the Mac that owns the certificate private key, export the certificate +
#      private key from Keychain Access/Xcode as a password-protected .p12.
#   3. Base64 encode the .p12 and store it as APPLE_CERTIFICATE, and store the
#      .p12 export password as APPLE_CERTIFICATE_PASSWORD. Example:
#
#        base64 -i DeveloperIDApplication.p12 | pbcopy
#
# App Store Connect API key for notarization:
#   1. In App Store Connect, go to Users and Access -> Integrations/API ->
#      App Store Connect API, create a Team key, and download AuthKey_<KEY_ID>.p8.
#      Apple only lets you download the private .p8 once, so save it somewhere
#      secure.
#   2. Store the raw contents of AuthKey_<KEY_ID>.p8 as APPLE_API_KEY.
#   3. Store the visible 10-character key id as APPLE_API_KEY_ID.
#   4. Store the Issuer ID UUID from the same App Store Connect API keys page as
#      APPLE_API_ISSUER.
#   5. Store your Apple Developer Team ID as APPLE_TEAM_ID.
#
# Secrets consumed by this workflow:
#   APPLE_CERTIFICATE           base64 .p12, or another CSC_LINK value accepted by electron-builder
#   APPLE_CERTIFICATE_PASSWORD  password for the Developer ID Application .p12
#   APPLE_API_KEY               contents of App Store Connect AuthKey_<KEY_ID>.p8
#   APPLE_API_KEY_ID            10-character App Store Connect API key ID
#   APPLE_API_ISSUER            App Store Connect issuer UUID
#   APPLE_TEAM_ID               Apple Developer Team ID
#
# Legacy Apple ID notarization is also wired for compatibility:
#   APPLE_ID
#   APPLE_PASSWORD              app-specific password
#
# BASELINE ACTION VERSIONS
# ------------------------
# Checked 2026-07-08 against official GitHub action releases:
#   actions/checkout        v7.0.0
#   actions/setup-node      v6.4.0
#   actions/upload-artifact v7.0.1
#
#
# MISE / CLI INSTALLATION NOTES
# -----------------------------
# Every run uploads a CLI/server artifact containing npm `.tgz` files and an
# install script.  The workflow summary shows commands like:
#
#   gh run download <run-id> -R mcowger/paseo -n <cli-artifact-name> -D /tmp/paseo-plus
#   npm install -g /tmp/paseo-plus/*.tgz
#
# mise's npm backend installs packages from an npm-compatible registry, e.g.:
#
#   mise use -g "npm:@getpaseo/cli@<plus-version>"
#
# That exact mise command only works if this out-of-band plus version is also
# published to an npm registry you can read.  The artifact tarballs are still the
# source of truth for this workflow; publishing is intentionally not enabled by
# default to avoid accidentally pushing unofficial packages to public npm.

on:
  workflow_dispatch:

  # Your fork won't receive upstream push events, so poll periodically.
  schedule:
    - cron: "17 */6 * * *"

  # Rebuild when you update any branch in your fork, except the generated branch.
  push:
    branches-ignore:
      - plus

permissions:
  contents: write
  pull-requests: read

defaults:
  run:
    shell: bash

concurrency:
  group: maintain-plus
  cancel-in-progress: true

env:
  UPSTREAM: getpaseo/paseo
  PLUS_BRANCH: plus
  INCLUDE_DRAFTS: "false"
  DESKTOP_PACKAGE_PATH: packages/desktop
  # Keep false unless you deliberately add an NPM_TOKEN with publish rights and
  # want `mise use -g npm:@getpaseo/cli@<plus-version>` to work from a registry.
  PUBLISH_PLUS_NPM: "false"
  PLUS_NPM_TAG: plus

jobs:
  rebuild-plus:
    runs-on: ubuntu-latest
    outputs:
      plus_sha: ${{ steps.rebuild.outputs.plus_sha }}
      plus_changed: ${{ steps.rebuild.outputs.plus_changed }}

    steps:
      - name: Rebuild plus from upstream + my open PRs
        id: rebuild
        env:
          GH_TOKEN: ${{ github.token }}
          FORK: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH="$(
            gh repo view "$UPSTREAM" \
              --json defaultBranchRef \
              --jq '.defaultBranchRef.name'
          )"

          echo "Upstream: $UPSTREAM"
          echo "Fork: $FORK"
          echo "Owner: $OWNER"
          echo "Base branch: $DEFAULT_BRANCH"
          echo "Generated branch: $PLUS_BRANCH"

          mkdir repo
          cd repo

          git init

          git remote add upstream "https://github.com/${UPSTREAM}.git"
          git remote add fork "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git"

          git fetch --no-tags --prune upstream \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/upstream/${DEFAULT_BRANCH}"

          git fetch --no-tags --prune fork \
            "+refs/heads/*:refs/remotes/fork/*"

          old_plus_sha="$(git rev-parse --verify --quiet "refs/remotes/fork/${PLUS_BRANCH}" || true)"
          if [[ -n "$old_plus_sha" ]]; then
            echo "Previous $PLUS_BRANCH SHA: $old_plus_sha"
          else
            echo "Previous $PLUS_BRANCH SHA: <none>"
          fi

          git switch -c "$PLUS_BRANCH" "refs/remotes/upstream/${DEFAULT_BRANCH}"

          gh pr list \
            --repo "$UPSTREAM" \
            --author "$OWNER" \
            --state open \
            --limit 100 \
            --json number,title,headRefName,headRepositoryOwner,isDraft \
            > /tmp/prs.json

          jq -r \
            --arg owner "$OWNER" \
            --arg include "$INCLUDE_DRAFTS" \
            '
              .[]
              | select(.headRepositoryOwner.login == $owner)
              | select($include == "true" or (.isDraft | not))
              | [.number, .headRefName, .title]
              | @tsv
            ' /tmp/prs.json > /tmp/prs.tsv

          if [[ ! -s /tmp/prs.tsv ]]; then
            echo "No open matching PRs. $PLUS_BRANCH will equal upstream/${DEFAULT_BRANCH}."
          fi

          while IFS=$'\t' read -r number branch title; do
            echo "::group::Merging PR #${number}: ${branch} — ${title}"

            if ! git rev-parse --verify --quiet "refs/remotes/fork/${branch}" >/dev/null; then
              echo "::error::Could not find fork branch ${branch}"
              exit 1
            fi

            git merge --no-edit --no-ff "refs/remotes/fork/${branch}"

            echo "::endgroup::"
          done < /tmp/prs.tsv

          plus_sha="$(git rev-parse HEAD)"
          plus_changed="true"
          if [[ -n "$old_plus_sha" && "$old_plus_sha" == "$plus_sha" ]]; then
            plus_changed="false"
          fi

          echo "Generated $PLUS_BRANCH SHA: $plus_sha"
          echo "plus_sha=$plus_sha" >> "$GITHUB_OUTPUT"
          echo "plus_changed=$plus_changed" >> "$GITHUB_OUTPUT"

          {
            echo "## Maintained plus branch"
            echo
            echo "Base: ${UPSTREAM}@${DEFAULT_BRANCH}"
            echo
            if [[ -s /tmp/prs.tsv ]]; then
              echo "Merged PR branches:"
              awk -F '\t' '{ printf "- #%s `%s` — %s\n", $1, $2, $3 }' /tmp/prs.tsv
            else
              echo "No open matching PR branches were merged."
            fi
            echo
            echo "Generated plus SHA: \`${plus_sha}\`"
            echo "Changed from previous plus: \`${plus_changed}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          git push --force-with-lease fork "HEAD:refs/heads/${PLUS_BRANCH}"

  build-desktop-artifacts:
    name: Build desktop artifact (${{ matrix.platform }} ${{ matrix.electron_arch }})
    needs: rebuild-plus
    if: ${{ needs.rebuild-plus.outputs.plus_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-14
            electron_arch: arm64
            artifact_globs: |
              packages/desktop/release/*.dmg
              packages/desktop/release/*.zip
          - platform: macos
            runner: macos-15-intel
            electron_arch: x64
            artifact_globs: |
              packages/desktop/release/*.dmg
              packages/desktop/release/*.zip
          - platform: linux
            runner: ubuntu-22.04
            electron_arch: x64
            artifact_globs: |
              packages/desktop/release/*.AppImage
              packages/desktop/release/*.deb
              packages/desktop/release/*.rpm
              packages/desktop/release/*.tar.gz
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout generated plus branch
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.PLUS_BRANCH }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      - name: Install JS dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Set plus package versions
        id: plus_version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          version="$(node <<'NODE'
          const fs = require('node:fs');

          const rootPackagePath = 'package.json';
          const rootPackage = JSON.parse(fs.readFileSync(rootPackagePath, 'utf8'));
          const match = String(rootPackage.version).match(/^(\d+)\.(\d+)\.(\d+)/);
          if (!match) {
            throw new Error(`Could not derive semver base from root version ${rootPackage.version}`);
          }

          const version = `${match[1]}.${match[2]}.${match[3]}-plus.${process.env.RUN_NUMBER}`;
          rootPackage.version = version;
          fs.writeFileSync(rootPackagePath, `${JSON.stringify(rootPackage, null, 2)}\n`);
          process.stdout.write(version);
          NODE
          )"
          echo "Set root version to ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          npm run version:sync-internal

      - name: Install Linux packaging prerequisites
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb rpm

      - name: Build desktop artifact
        env:
          GH_TOKEN: ${{ github.token }}
          EP_GH_IGNORE_TIME: true
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          PASEO_DESKTOP_SMOKE: "1"
        run: |
          set -euo pipefail

          build_args=(-- --publish never --${{ matrix.platform == 'macos' && 'mac' || 'linux' }} --${{ matrix.electron_arch }})

          if [[ "${{ matrix.platform }}" == "macos" && -n "${APPLE_API_KEY_CONTENT:-}" ]]; then
            if [[ -z "${APPLE_API_KEY_ID:-}" || -z "${APPLE_API_ISSUER:-}" ]]; then
              echo "::error::APPLE_API_KEY is set, but APPLE_API_KEY_ID or APPLE_API_ISSUER is missing."
              exit 1
            fi
            apple_api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "${APPLE_API_KEY_CONTENT}" > "${apple_api_key_path}"
            chmod 600 "${apple_api_key_path}"
            export APPLE_API_KEY="${apple_api_key_path}"
            echo "Using App Store Connect API key for macOS notarization."
          fi

          if [[ "${{ matrix.platform }}" == "macos" && -z "${CSC_LINK:-}" ]]; then
            echo "No Apple signing certificate secret configured; building unsigned macOS artifact."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            build_args+=("-c.mac.identity=null")
            build_args+=("-c.mac.notarize=false")
            build_args+=("-c.mac.hardenedRuntime=false")
          fi

          npm run build:desktop "${build_args[@]}"

      - name: List built desktop artifacts
        run: find "${DESKTOP_PACKAGE_PATH}/release" -maxdepth 1 -type f -print | sort

      - name: Upload desktop artifacts
        id: upload_desktop
        uses: actions/upload-artifact@v7.0.1
        with:
          name: paseo-plus-desktop-${{ matrix.platform }}-${{ matrix.electron_arch }}-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}
          path: ${{ matrix.artifact_globs }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Add desktop artifact summary
        run: |
          {
            echo "## Desktop plus artifact: ${{ matrix.platform }} ${{ matrix.electron_arch }}"
            echo
            echo "Built from \`${PLUS_BRANCH}\` at \`${{ needs.rebuild-plus.outputs.plus_sha }}\`."
            echo
            echo "Download the artifact named:"
            echo
            echo "\`paseo-plus-desktop-${{ matrix.platform }}-${{ matrix.electron_arch }}-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}\`"
            echo
            echo "Artifact link: ${{ steps.upload_desktop.outputs.artifact-url }}"
            echo
            if [[ "${{ matrix.platform }}" == "macos" ]]; then
              echo "If Apple signing secrets are not configured in this fork, this macOS artifact is unsigned."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-cli-server-artifacts:
    name: Build installable CLI/server npm packages
    needs: rebuild-plus
    if: ${{ needs.rebuild-plus.outputs.plus_changed == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout generated plus branch
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ env.PLUS_BRANCH }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
          registry-url: "https://npm.pkg.github.com"
          scope: "@boudra"

      - name: Install JS dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Set plus package versions
        id: plus_version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          version="$(node <<'NODE'
          const fs = require('node:fs');

          const rootPackagePath = 'package.json';
          const rootPackage = JSON.parse(fs.readFileSync(rootPackagePath, 'utf8'));
          const match = String(rootPackage.version).match(/^(\d+)\.(\d+)\.(\d+)/);
          if (!match) {
            throw new Error(`Could not derive semver base from root version ${rootPackage.version}`);
          }

          const version = `${match[1]}.${match[2]}.${match[3]}-plus.${process.env.RUN_NUMBER}`;
          rootPackage.version = version;
          fs.writeFileSync(rootPackagePath, `${JSON.stringify(rootPackage, null, 2)}\n`);
          process.stdout.write(version);
          NODE
          )"
          echo "Set root version to ${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          npm run version:sync-internal

      - name: Build CLI/server package outputs
        run: npm run build:server:clean

      - name: Pack CLI/server install tarballs
        run: |
          set -euo pipefail
          mkdir -p artifacts/npm-packages
          workspaces=(
            @getpaseo/highlight
            @getpaseo/relay
            @getpaseo/protocol
            @getpaseo/client
            @getpaseo/server
            @getpaseo/cli
          )
          for workspace in "${workspaces[@]}"; do
            npm pack --workspace="$workspace" --pack-destination artifacts/npm-packages --ignore-scripts
          done

          cat > artifacts/npm-packages/install-cli-server.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$(dirname "$0")"
          npm install -g ./*.tgz
          SH
          chmod +x artifacts/npm-packages/install-cli-server.sh

          cat > artifacts/npm-packages/INSTALL.md <<MD
          # Paseo plus CLI/server packages

          These tarballs were built from the generated \`plus\` branch.

          Plus package version:

          \`\`\`text
          ${{ steps.plus_version.outputs.version }}
          \`\`\`

          To install the CLI and its local plus-version server dependencies:

          \`\`\`bash
          ./install-cli-server.sh
          \`\`\`

          Or manually:

          \`\`\`bash
          npm install -g ./*.tgz
          \`\`\`

          The installed CLI binary is:

          \`\`\`bash
          paseo
          \`\`\`

          ## mise

          mise can install npm tools from an npm-compatible registry. If this same
          plus version has been published to a registry that your npm config can read:

          \`\`\`bash
          mise use -g "npm:@getpaseo/cli@${{ steps.plus_version.outputs.version }}"
          \`\`\`

          The GitHub Actions artifact itself is a bundle of local tarballs, so the
          artifact install path is still \`npm install -g ./*.tgz\`.
          MD

      - name: List packed CLI/server artifacts
        run: find artifacts/npm-packages -maxdepth 1 -type f -print | sort

      - name: Optionally publish plus packages to npm
        if: ${{ env.PUBLISH_PLUS_NPM == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::PUBLISH_PLUS_NPM=true but the NPM_TOKEN secret is empty/missing."
            exit 1
          fi
          npm config set registry "https://registry.npmjs.org/"
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          for workspace in \
            @getpaseo/highlight \
            @getpaseo/relay \
            @getpaseo/protocol \
            @getpaseo/client \
            @getpaseo/server \
            @getpaseo/cli; do
            npm publish --workspace="$workspace" --access public --tag "$PLUS_NPM_TAG"
          done

      - name: Upload CLI/server npm package artifacts
        id: upload_cli
        uses: actions/upload-artifact@v7.0.1
        with:
          name: paseo-plus-cli-server-npm-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}
          path: artifacts/npm-packages/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Add CLI/server artifact summary
        run: |
          {
            echo "## CLI/server plus artifact"
            echo
            echo "Built from \`${PLUS_BRANCH}\` at \`${{ needs.rebuild-plus.outputs.plus_sha }}\`."
            echo
            echo "Download the artifact named:"
            echo
            echo "\`paseo-plus-cli-server-npm-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}\`"
            echo
            echo "Artifact link: ${{ steps.upload_cli.outputs.artifact-url }}"
            echo
            echo "Plus package version: \`${{ steps.plus_version.outputs.version }}\`"
            echo
            echo "Download and install with GitHub CLI:"
            echo
            echo "```bash"
            echo "gh run download ${{ github.run_id }} -R ${{ github.repository }} -n 'paseo-plus-cli-server-npm-${{ github.run_number }}-${{ needs.rebuild-plus.outputs.plus_sha }}' -D /tmp/paseo-plus-cli"
            echo "npm install -g /tmp/paseo-plus-cli/*.tgz"
            echo "paseo --version"
            echo "```"
            echo
            echo "mise command if this plus version is also published to an npm registry:"
            echo
            echo "```bash"
            echo "mise use -g 'npm:@getpaseo/cli@${{ steps.plus_version.outputs.version }}'"
            echo "```"
          } >> "$GITHUB_STEP_SUMMARY"

  summarize-plus-installation:
    name: Summarize plus artifact install commands
    needs:
      - rebuild-plus
      - build-desktop-artifacts
      - build-cli-server-artifacts
    if: ${{ always() && (needs.rebuild-plus.outputs.plus_changed == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read

    steps:
      - name: Write final artifact and install summary
        env:
          GH_TOKEN: ${{ github.token }}
          PLUS_SHA: ${{ needs.rebuild-plus.outputs.plus_sha }}
        run: |
          set -euo pipefail

          echo "## Plus install summary" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "Generated branch: \`${PLUS_BRANCH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Generated SHA: \`${PLUS_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_STEP_SUMMARY"

          root_package_json="$(gh api "repos/${GITHUB_REPOSITORY}/contents/package.json?ref=${PLUS_BRANCH}" --jq '.content' | base64 -d)"
          base_version="$(jq -r '.version' <<<"${root_package_json}")"
          plus_version="$(node -e 'const [M,m,p] = process.argv[1].match(/^(\d+)\.(\d+)\.(\d+)/).slice(1); console.log(`${M}.${m}.${p}-plus.${process.env.GITHUB_RUN_NUMBER}`)' "${base_version}")"
          echo "Plus package version: \`${plus_version}\`" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            --paginate \
            --jq '.artifacts[] | select(.expired == false) | [.id, .name] | @tsv' > /tmp/artifacts.tsv

          if [[ ! -s /tmp/artifacts.tsv ]]; then
            echo "No artifacts were found for this run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          while IFS=$'\t' read -r id name; do
            echo "- [${name}](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${id})" >> "$GITHUB_STEP_SUMMARY"
          done < /tmp/artifacts.tsv
          echo >> "$GITHUB_STEP_SUMMARY"

          cli_artifact="$(awk -F '\t' '$2 ~ /^paseo-plus-cli-server-npm-/ { print $2; exit }' /tmp/artifacts.tsv || true)"
          if [[ -n "${cli_artifact}" ]]; then
            echo "### CLI/server install" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo "gh run download ${GITHUB_RUN_ID} -R ${GITHUB_REPOSITORY} -n '${cli_artifact}' -D /tmp/paseo-plus-cli" >> "$GITHUB_STEP_SUMMARY"
            echo "npm install -g /tmp/paseo-plus-cli/*.tgz" >> "$GITHUB_STEP_SUMMARY"
            echo "paseo --version" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "If you enable npm publishing for plus versions, the equivalent mise shape is:" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo "mise use -g 'npm:@getpaseo/cli@${plus_version}'" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
